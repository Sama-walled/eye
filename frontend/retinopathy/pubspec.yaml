name: retinopathy_detector
description: Diabetic Retinopathy AI Screening App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  shared_preferences: ^2.2.2
  image_picker: ^1.0.7
  lottie: ^2.7.0
  flutter_riverpod: ^2.4.9
  intl: ^0.20.2
  camera: ^0.10.5+5
  path_provider: ^2.1.1
  pdf: ^3.10.7
  share_plus: ^7.2.1
  flutter_staggered_animations: ^1.1.1
  photo_view: ^0.14.0
  url_launcher: ^6.2.2
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/

